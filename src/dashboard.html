<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StatPRO Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(110deg, #f0f0f0 0%, #f5e8b6 100%);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 68px;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 8px;
            flex-shrink: 0;
            box-shadow: 2px 0 8px rgba(0,0,0,0.06);
        }

        .sidebar-logo {
            color: #1a1a1a;
            font-weight: 700;
            font-size: 11px;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .sidebar-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-icon.active { background: #1a1a1a; }
        .sidebar-icon:hover { background: #f0f0f0; }

        .sidebar-icon svg { width: 18px; height: 18px; fill: #888; }
        .sidebar-icon.active svg { fill: #fff; }

        .sidebar-bottom { margin-top: auto; }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Top bar ── */
        .topbar {
            height: 60px;
            background: #fff;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            border-bottom: 1px solid #e8eaf0;
            flex-shrink: 0;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f6fa;
            border-radius: 8px;
            padding: 8px 14px;
            width: 260px;
        }

        .search-box svg { width: 16px; height: 16px; fill: #aab; }

        .search-box span {
            color: #aab;
            font-size: 14px;
        }

        .topbar-spacer { flex: 1; }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e0e4f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-name {
            font-size: 14px;
            color: #444;
            font-weight: 500;
        }

        /* ── Content ── */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 16px;
            overflow: hidden;
        }

        /* Top row */
        .row-top {
            display: flex;
            gap: 16px;
            flex: 6;
            min-height: 0;
        }

        /* Bottom row */
        .row-bottom {
            display: flex;
            gap: 16px;
            flex: 4;
            min-height: 0;
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: #282823; /* ili #1a1a1a ako je pozadina svetla */
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .placeholder {
            flex: 1;
            border-radius: 10px;
            background: transparent;
            min-height: 0;
        }

        /* Map card — large left */
        .card-map {
            flex: 65;
        }

        /* Right column */
        .col-right {
            flex: 35;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
        }

        /* Today visitors & Scatter — combined */
        .card-visitors,
        .card-scatter {
            background: #f2c94c;
            flex: 1;
        }

        .card-effectiveness {
            background: rgba(255, 255, 255, 0.7);
            flex: 0.8;
        }

        .card-visitors .card-title,
        .card-scatter .card-title { 
            color: #fff; 
        }

        .card-visitors .placeholder,
        .card-scatter .placeholder { 
            background: transparent; /*ovde crna */
        }

        /* Bottom cards equal width */
        .card-bottom {
            flex: 1;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .metric-item {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            padding: 12px;
        }

        .metric-label {
            font-size: 12px;
            color: #575757;
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 28px;
            line-height: 1;
            font-weight: 700;
            color: #1f1f1f;
        }

        .metric-value.error {
            color: #a40000;
            font-size: 14px;
            line-height: 1.3;
            font-weight: 600;
        }

        .effectiveness-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex: 1;
        }

        .pie-chart {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(#2f7d32 0deg, #2f7d32 0deg, #e8e8e8 0deg, #e8e8e8 360deg);
            position: relative;
            transition: background 0.3s ease;
        }

        .pie-chart::after {
            content: '';
            position: absolute;
            inset: 18px;
            background: #fff;
            border-radius: 50%;
        }

        .pie-center-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: #1f1f1f;
            z-index: 1;
        }

        .effectiveness-caption {
            font-size: 13px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="/" style="text-decoration:none;color:inherit"><div class="sidebar-logo">Stat<br>PRO</div></a>

        <a href="/" style="text-decoration:none"><div class="sidebar-icon active">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </div></a>
        <a href="/top-liste" style="text-decoration:none"><div class="sidebar-icon">
            <svg viewBox="0 0 24 24" stroke="#888" stroke-width="2" fill="none"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="#888" stroke="none"/><circle cx="3" cy="12" r="1.5" fill="#888" stroke="none"/><circle cx="3" cy="18" r="1.5" fill="#888" stroke="none"/></svg>
        </div></a>
        <a href="/notifikacije" style="text-decoration:none"><div class="sidebar-icon">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div></a>
        <div class="sidebar-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>

        <div class="sidebar-bottom">
            <div class="sidebar-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </div>
            <div class="sidebar-icon" style="margin-top:8px">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <header class="topbar">
            <div class="search-box">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22" stroke="#aab" stroke-width="2"/></svg>
                <span>Search</span>
            </div>
            <div class="topbar-spacer"></div>
            <div class="user-avatar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#4c6ef5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </div>
            <span class="user-name">Jayden</span>
        </header>

        <!-- Content -->
        <div class="content">

            <!-- Top row -->
            <div class="row-top">

                <!-- Map placeholder -->
                <div class="card card-map">
                    <div class="card-title">Visitors statistics</div>
                    <div class="placeholder"></div>
                </div>

                <!-- Right column -->
                <div class="col-right">

                    <!-- Today visitors & Scatter combined -->
                    <div class="card card-visitors">
                        <div class="card-title">Network KPI Overview</div>
                        <div class="metric-grid">
                            <div class="metric-item">
                                <div class="metric-label">Active Meters</div>
                                <div class="metric-value" id="numActiveMeters">-</div>
                            </div>
                            <div class="metric-item">
                                <div class="metric-label">Down Meters</div>
                                <div class="metric-value" id="numDownMeters">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="card card-effectiveness">
                        <div class="card-title">Network Effectivness</div>
                        <div class="effectiveness-wrap">
                            <div class="pie-chart" id="networkEffectivenessPie">
                                <div class="pie-center-text" id="networkEffectivnessPercentage">-</div>
                            </div>
                            <div class="effectiveness-caption">Aktivna mreza u odnosu na ukupan broj brojila</div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Bottom row -->
            <div class="row-bottom">

                <div class="card card-bottom">
                    <div class="card-title">Top Countries</div>
                    <div class="placeholder"></div>
                </div>

                <div class="card card-bottom">
                    <div class="card-title">Audience by Age</div>
                    <div class="placeholder"></div>
                </div>

                <div class="card card-bottom">
                    <div class="card-title">Statistic By Gender</div>
                    <div class="placeholder"></div>
                </div>

            </div>
        </div>

    </div>

    <script src="dashboard.js"></script>

</body>
</html>

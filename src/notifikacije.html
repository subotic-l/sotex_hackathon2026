<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StatPRO – Notifikacije</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(110deg, #f0f0f0 0%, #f5e8b6 100%);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 68px;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 8px;
            flex-shrink: 0;
            box-shadow: 2px 0 8px rgba(0,0,0,0.06);
        }
        .sidebar-logo {
            color: #1a1a1a; font-weight: 700; font-size: 11px;
            text-align: center; margin-bottom: 20px; line-height: 1.2; text-decoration: none;
        }
        .sidebar-icon {
            width: 40px; height: 40px; border-radius: 10px; background: transparent;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.2s; text-decoration: none;
        }
        .sidebar-icon.active { background: #1a1a1a; }
        .sidebar-icon:hover:not(.active) { background: #f0f0f0; }
        .sidebar-icon svg { width: 18px; height: 18px; fill: #888; }
        .sidebar-icon.active svg { fill: #fff; }
        .sidebar-bottom { margin-top: auto; }

        /* ── Main ── */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Topbar ── */
        .topbar {
            height: 60px; background: #fff; display: flex; align-items: center;
            padding: 0 24px; gap: 16px; border-bottom: 1px solid #e8eaf0; flex-shrink: 0;
        }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            background: #f5f6fa; border-radius: 8px; padding: 8px 14px; width: 280px;
        }
        .search-box svg { width: 16px; height: 16px; fill: #aab; flex-shrink: 0; }
        .search-box input {
            border: none; background: transparent; outline: none; font-size: 14px; color: #333; width: 100%;
        }
        .search-box input::placeholder { color: #aab; }
        .topbar-spacer { flex: 1; }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%; background: #e0e4f5;
            display: flex; align-items: center; justify-content: center;
        }
        .user-name { font-size: 14px; color: #444; font-weight: 500; }

        /* ── Content ── */
        .content {
            flex: 1; display: flex; flex-direction: column;
            padding: 20px; gap: 16px; overflow: hidden;
        }

        /* ── Page header ── */
        .page-header { display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
        .page-title { font-size: 20px; font-weight: 700; color: #1a1a1a; }
        .page-subtitle { font-size: 13px; color: #888; margin-top: 2px; }

        /* ── Stats row ── */
        .stats-row {
            display: flex; gap: 12px; flex-shrink: 0;
        }
        .stat-card {
            flex: 1;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex; align-items: center; gap: 14px;
        }
        .stat-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .stat-icon svg { width: 20px; height: 20px; }
        .stat-icon.red   { background: #ffeaea; }
        .stat-icon.red svg { fill: #e74c3c; }
        .stat-icon.orange { background: #fff3e0; }
        .stat-icon.orange svg { fill: #f39c12; }
        .stat-icon.blue  { background: #e3f0ff; }
        .stat-icon.blue svg { fill: #2980b9; }
        .stat-icon.green { background: #e8f5e9; }
        .stat-icon.green svg { fill: #2e7d32; }
        .stat-label { font-size: 12px; color: #888; }
        .stat-value { font-size: 22px; font-weight: 700; color: #1a1a1a; }

        /* ── Filter bar ── */
        .filter-bar {
            display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap;
        }
        .filter-tabs {
            display: flex; gap: 6px; background: rgba(255,255,255,0.5);
            border-radius: 10px; padding: 4px;
        }
        .filter-tab {
            padding: 6px 14px; border-radius: 7px; font-size: 13px; font-weight: 500;
            cursor: pointer; color: #666; transition: all 0.2s; border: none; background: transparent;
        }
        .filter-tab.active { background: #1a1a1a; color: #fff; }
        .filter-tab:hover:not(.active) { background: rgba(0,0,0,0.06); }
        .sort-select {
            padding: 7px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.5); font-size: 13px; color: #444; cursor: pointer; outline: none;
        }
        .filter-spacer { flex: 1; }
        .count-badge {
            background: rgba(255,255,255,0.5); border-radius: 8px;
            padding: 6px 12px; font-size: 13px; color: #555;
        }
        .count-badge span { font-weight: 700; color: #1a1a1a; }

        /* ── Cards ── */
        .cards-wrapper { flex: 1; overflow-y: auto; padding-right: 4px; }
        .cards-wrapper::-webkit-scrollbar { width: 4px; }
        .cards-wrapper::-webkit-scrollbar-track { background: transparent; }
        .cards-wrapper::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px; padding-bottom: 8px;
        }

        .card {
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 16px; padding: 16px; cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
            border-left: 4px solid transparent;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.10); background: rgba(255,255,255,0.65); }
        .card.alarm       { border-left-color: #e74c3c; }
        .card.upozorenje  { border-left-color: #f39c12; }
        .card.gubitak     { border-left-color: #8e44ad; }
        .card.info        { border-left-color: #2980b9; }

        .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }

        .card-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
        }
        .badge-alarm      { background: #ffeaea; color: #c0392b; }
        .badge-upozorenje { background: #fff3cd; color: #8a6000; }
        .badge-gubitak    { background: #f3e5f5; color: #6a1b9a; }
        .badge-info       { background: #e3f0ff; color: #1a5c8a; }

        .card-time { font-size: 11px; color: #aaa; white-space: nowrap; }

        .card-naziv { font-size: 15px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; line-height: 1.3; }
        .card-poruka { font-size: 13px; color: #555; margin-bottom: 12px; line-height: 1.45; }

        .card-change {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.04); border-radius: 8px; padding: 8px 12px;
        }
        .change-arrow { font-size: 18px; font-weight: 700; }
        .change-arrow.up   { color: #e74c3c; }
        .change-arrow.down { color: #2e7d32; }
        .change-vals { font-size: 13px; color: #444; }
        .change-pct {
            margin-left: auto; font-size: 13px; font-weight: 700; padding: 2px 8px;
            border-radius: 6px;
        }
        .change-pct.up   { background: #ffeaea; color: #c0392b; }
        .change-pct.down { background: #e8f5e9; color: #2e7d32; }
        .change-pct.loss { background: #f3e5f5; color: #6a1b9a; }

        /* ── Empty state ── */
        .empty-state {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; gap: 12px; padding: 60px 20px; color: #aaa;
        }
        .empty-state svg { width: 48px; height: 48px; fill: #ccc; }
        .empty-state p { font-size: 15px; }

        /* ── Skeleton ── */
        .skeleton-card { background: rgba(255,255,255,0.4); border-radius: 16px; padding: 16px; border: 1px solid rgba(255,255,255,0.3); }
        @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
        .skeleton-line {
            height: 14px; border-radius: 7px; margin-bottom: 10px;
            background: linear-gradient(90deg,#eee 25%,#f8f8f8 50%,#eee 75%);
            background-size: 800px 100%; animation: shimmer 1.4s infinite;
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: 20px;
            width: min(580px, calc(100vw - 40px)); max-height: calc(100vh - 60px);
            overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.22s ease;
        }
        @keyframes modalIn { from{opacity:0;transform:scale(0.94) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }

        .modal-header {
            padding: 22px 24px 16px; border-bottom: 1px solid #f0f0f0;
            display: flex; align-items: flex-start; gap: 14px;
        }
        .modal-icon {
            width: 46px; height: 46px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .modal-icon svg { width: 22px; height: 22px; }
        .modal-icon.alarm     { background: #ffeaea; }
        .modal-icon.alarm svg { fill: #e74c3c; }
        .modal-icon.upozorenje     { background: #fff3e0; }
        .modal-icon.upozorenje svg { fill: #f39c12; }
        .modal-icon.gubitak     { background: #f3e5f5; }
        .modal-icon.gubitak svg { fill: #8e44ad; }
        .modal-icon.info     { background: #e3f0ff; }
        .modal-icon.info svg { fill: #2980b9; }

        .modal-title { font-size: 18px; font-weight: 700; color: #1a1a1a; line-height: 1.3; }
        .modal-subtitle { font-size: 13px; color: #888; margin-top: 3px; }
        .modal-close {
            margin-left: auto; width: 30px; height: 30px; border-radius: 8px;
            background: #f5f5f5; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 16px; color: #666; transition: background 0.15s;
        }
        .modal-close:hover { background: #eee; }
        .modal-body { padding: 20px 24px 24px; }

        .modal-section { margin-bottom: 20px; }
        .modal-section-title {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.8px; color: #aaa; margin-bottom: 12px;
        }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-item { background: #f8f8f8; border-radius: 10px; padding: 12px 14px; }
        .info-item.full { grid-column: 1 / -1; }
        .info-label { font-size: 11px; color: #999; margin-bottom: 4px; }
        .info-value { font-size: 15px; font-weight: 600; color: #1a1a1a; word-break: break-word; }
        .info-value.red    { color: #c0392b; }
        .info-value.green  { color: #2e7d32; }
        .info-value.purple { color: #6a1b9a; }
        .info-value.orange { color: #d4a000; }

        .change-block {
            background: #f8f8f8; border-radius: 10px; padding: 14px 16px;
            display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        }
        .cb-val { font-size: 22px; font-weight: 700; }
        .cb-val.up   { color: #e74c3c; }
        .cb-val.down { color: #2e7d32; }
        .cb-arrow { font-size: 22px; color: #bbb; }
        .cb-label { font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="/" class="sidebar-logo">Stat<br>PRO</a>
        <a href="/" class="sidebar-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </a>
        <a href="/top-liste" class="sidebar-icon">
            <svg viewBox="0 0 24 24" stroke="#888" stroke-width="2" fill="none"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="#888" stroke="none"/><circle cx="3" cy="12" r="1.5" fill="#888" stroke="none"/><circle cx="3" cy="18" r="1.5" fill="#888" stroke="none"/></svg>
        </a>
        <a href="/notifikacije" class="sidebar-icon active">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </a>
        <div class="sidebar-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>
        <div class="sidebar-bottom">
            <div class="sidebar-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </div>
            <div class="sidebar-icon" style="margin-top:8px">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
        </div>
    </aside>

    <div class="main">
        <header class="topbar">
            <div class="search-box">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22" stroke="#aab" stroke-width="2"/></svg>
                <input type="text" id="globalSearch" placeholder="Pretraži notifikacije…" />
            </div>
            <div class="topbar-spacer"></div>
            <div class="user-avatar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#4c6ef5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </div>
            <span class="user-name">Jayden</span>
        </header>

        <div class="content">

            <div class="page-header">
                <div>
                    <div class="page-title">Notifikacije</div>
                    <div class="page-subtitle">Nagla promena potrošnje · Gubici · Alarmi</div>
                </div>
            </div>

            <!-- Stats summary -->
            <div class="stats-row" id="statsRow">
                <div class="stat-card">
                    <div class="stat-icon red"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                    <div><div class="stat-label">Alarmi</div><div class="stat-value" id="cntAlarm">0</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
                    <div><div class="stat-label">Nagla promena</div><div class="stat-value" id="cntPromena">0</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#f3e5f5"><svg viewBox="0 0 24 24" style="fill:#8e44ad"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
                    <div><div class="stat-label">Gubici</div><div class="stat-value" id="cntGubitak">0</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg></div>
                    <div><div class="stat-label">Informacije</div><div class="stat-value" id="cntInfo">0</div></div>
                </div>
            </div>

            <!-- Filter bar -->
            <div class="filter-bar">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-tab="sve">Sve</button>
                    <button class="filter-tab" data-tab="alarm">Alarm</button>
                    <button class="filter-tab" data-tab="upozorenje">Upozorenje</button>
                    <button class="filter-tab" data-tab="gubitak">Gubitak</button>
                    <button class="filter-tab" data-tab="info">Info</button>
                </div>
                <select class="sort-select" id="sortSelect">
                    <option value="najnoviji">Najnoviji</option>
                    <option value="najstariji">Najstariji</option>
                    <option value="promena_desc">Promena % ↓</option>
                    <option value="promena_asc">Promena % ↑</option>
                </select>
                <div class="filter-spacer"></div>
                <div class="count-badge">Prikazano: <span id="cardCount">0</span></div>
            </div>

            <!-- Cards -->
            <div class="cards-wrapper">
                <div class="cards-grid" id="cardsGrid"></div>
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <p>Nema notifikacija za odabrani filter</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon" id="modalIcon">
                    <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                </div>
                <div>
                    <div class="modal-title" id="modalTitle">—</div>
                    <div class="modal-subtitle" id="modalSubtitle">—</div>
                </div>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="notifikacije.js"></script>
</body>
</html>
